location /__PHPMYADMIN_ALIAS__ {
    alias /usr/share/phpmyadmin/;
    index index.php;

    location ~ ^/__PHPMYADMIN_ALIAS__/(.+\.php)$ {
        alias /usr/share/phpmyadmin/$1;
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME /usr/share/phpmyadmin/$1;
        fastcgi_pass unix:/run/php/php__PHP_VERSION__-fpm.sock;
    }

    location ~* ^/__PHPMYADMIN_ALIAS__/(.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf))$ {
        alias /usr/share/phpmyadmin/$1;
        expires 30d;
        access_log off;
        log_not_found off;
    }
}